version: '3.8'
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: the-virus-cult-app
        container_name: the-virus-cult-app
        ports:
            - "80:80"
            - "443:443"
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/node_modules
        networks:
            - sail
        depends_on:
            - mysql
            - mailpit
        healthcheck:
            test: ["CMD", "php", "artisan", "health:check"]
            interval: 10s
            timeout: 5s
            retries: 5

    mysql:
        image: 'mysql/mysql-server:8.0'
        container_name: the-virus-cult-mysql
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: 'password'
            MYSQL_DATABASE: 'laravel'
            MYSQL_USER: 'sail'
            MYSQL_PASSWORD: 'password'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s
            interval: 10s

    mailpit:
        image: 'axllent/mailpit:latest'
        container_name: the-virus-cult-mailpit
        ports:
            - '1025:1025'
            - '8025:8025'
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local